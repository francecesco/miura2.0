services:
  miura:
    build: .
    image: miura2:latest
    container_name: miura
    network_mode: host
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
